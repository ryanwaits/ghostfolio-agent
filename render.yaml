services:
  - type: web
    name: ghostfolio
    runtime: docker
    plan: starter
    region: oregon
    healthCheckPath: /api/v1/health
    envVars:
      - key: ACCESS_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ghostfolio-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: ghostfolio-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: ghostfolio-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        value: ""
      - key: POSTGRES_USER
        fromDatabase:
          name: ghostfolio-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: ghostfolio-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: ghostfolio-db
          property: database
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

  - type: redis
    name: ghostfolio-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: ghostfolio-db
    plan: basic-1gb
    region: oregon
    databaseName: ghostfolio
    user: ghostfolio
