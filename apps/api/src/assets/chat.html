<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentForge - Portfolio Assistant</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #262626;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #fafafa; }
    header .badge {
      font-size: 12px;
      color: #737373;
      background: #1a1a1a;
      padding: 2px 8px;
      border-radius: 4px;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 720px;
      line-height: 1.6;
      font-size: 14px;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #1a3a5c;
      padding: 12px 16px;
      border-radius: 16px 16px 4px 16px;
      white-space: pre-wrap;
    }
    .msg.assistant { align-self: flex-start; color: #d4d4d4; }
    .msg.assistant.streaming { white-space: pre-wrap; }
    .msg.error { color: #ef4444; font-size: 13px; }
    .tool-call {
      font-size: 12px;
      color: #737373;
      padding: 4px 0;
      font-style: italic;
    }

    /* Markdown styles for assistant messages */
    .msg.assistant p { margin: 0 0 12px 0; }
    .msg.assistant p:last-child { margin-bottom: 0; }
    .msg.assistant ul, .msg.assistant ol { margin: 0 0 12px 20px; }
    .msg.assistant li { margin: 4px 0; }
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3,
    .msg.assistant h4, .msg.assistant h5, .msg.assistant h6 {
      color: #fafafa;
      margin: 16px 0 8px 0;
    }
    .msg.assistant h1:first-child, .msg.assistant h2:first-child,
    .msg.assistant h3:first-child { margin-top: 0; }
    .msg.assistant h1 { font-size: 18px; }
    .msg.assistant h2 { font-size: 16px; }
    .msg.assistant h3 { font-size: 15px; }
    .msg.assistant code {
      background: #1e1e1e;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    }
    .msg.assistant pre {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 8px 0 12px 0;
      overflow-x: auto;
    }
    .msg.assistant pre code {
      background: none;
      padding: 0;
      font-size: 13px;
      line-height: 1.5;
    }
    .msg.assistant blockquote {
      border-left: 3px solid #404040;
      padding-left: 12px;
      color: #a3a3a3;
      margin: 8px 0 12px 0;
    }
    .msg.assistant table {
      border-collapse: collapse;
      margin: 8px 0 12px 0;
      font-size: 13px;
      width: 100%;
    }
    .msg.assistant th, .msg.assistant td {
      border: 1px solid #2a2a2a;
      padding: 8px 12px;
      text-align: left;
    }
    .msg.assistant th {
      background: #1a1a1a;
      color: #fafafa;
      font-weight: 600;
    }
    .msg.assistant hr {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 16px 0;
    }
    .msg.assistant a {
      color: #60a5fa;
      text-decoration: none;
    }
    .msg.assistant a:hover { text-decoration: underline; }
    .msg.assistant strong { color: #fafafa; }

    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #262626;
      display: flex;
      gap: 12px;
    }
    #input-area textarea {
      flex: 1;
      background: #171717;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 12px 16px;
      color: #fafafa;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 120px;
    }
    #input-area textarea:focus { border-color: #404040; }
    #input-area button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    #input-area button:hover { background: #1d4ed8; }
    #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>AgentForge</h1>
    <span class="badge">Portfolio Assistant</span>
  </header>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Ask about your portfolio..." autofocus></textarea>
    <button id="send">Send</button>
  </div>
  <script>
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true
    });

    var API_BASE = window.location.origin;
    var messagesEl = document.getElementById("messages");
    var inputEl = document.getElementById("input");
    var sendBtn = document.getElementById("send");
    var conversation = [];
    var authToken = null;

    inputEl.addEventListener("input", function() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    inputEl.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener("click", function() {
      sendMessage();
    });

    (function init() {
      authToken = localStorage.getItem("agentforge_token");
      if (!authToken) {
        authToken = prompt("Enter your Ghostfolio JWT token:");
        if (authToken) localStorage.setItem("agentforge_token", authToken);
      }
    })();

    function addMsg(role, html) {
      var d = document.createElement("div");
      d.className = "msg " + role;
      d.innerHTML = html;
      messagesEl.appendChild(d);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return d;
    }

    function esc(s) {
      var d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    async function sendMessage() {
      var text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;

      addMsg("user", esc(text));
      conversation.push({ role: "user", content: text });

      var el = addMsg("assistant", "");
      el.classList.add("streaming");
      var full = "";

      try {
        var res = await fetch(API_BASE + "/api/v1/agent/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + authToken
          },
          body: JSON.stringify({ messages: conversation })
        });

        if (!res.ok) throw new Error(res.status + ": " + (await res.text()));

        var reader = res.body.getReader();
        var decoder = new TextDecoder();
        var buffer = "";

        while (true) {
          var r = await reader.read();
          if (r.done) break;
          buffer += decoder.decode(r.value, { stream: true });

          var lines = buffer.split("\n");
          buffer = lines.pop();

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line.startsWith("data: ")) continue;
            var data = line.slice(6);
            if (data === "[DONE]") continue;

            try {
              var evt = JSON.parse(data);

              if (evt.type === "text-delta") {
                full += evt.delta;
                el.textContent = full;
              } else if (evt.type === "tool-input-start") {
                var td = document.createElement("div");
                td.className = "tool-call";
                td.textContent = "Calling " + evt.toolName + "...";
                el.parentNode.insertBefore(td, el);
              }
            } catch (e) {}
          }
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // Render final markdown
        if (full) {
          el.classList.remove("streaming");
          el.innerHTML = marked.parse(full);
          messagesEl.scrollTop = messagesEl.scrollHeight;
          conversation.push({ role: "assistant", content: full });
        }
      } catch (err) {
        addMsg("error", "Error: " + esc(err.message));
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>
